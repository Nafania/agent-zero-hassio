name: Agent Zero
version: "1.14"
slug: agent_zero
description: AI Assistant - Autonomous agent framework
arch:
  - aarch64
  - amd64
url: https://github.com/agent0ai/agent-zero
build_from: Dockerfile

# Network configuration - Agent Zero default port is 80
host_network: false
ports:
  80/tcp: 50001

# Note: Ingress is not supported due to Agent Zero's URL structure
# Use panel_iframe in configuration.yaml to add to sidebar
# See DOCS.md for instructions
ingress: false

options:
  agent_zero_branch: "main"
  extension_repositories: []
  extensions_auto_install: true
  extensions_auto_run_installers: true
  extensions_auto_run_commands: false
  extensions_debug: false

schema:
  agent_zero_branch: str
  extension_repositories:
    - str
  extensions_auto_install: bool
  extensions_auto_run_installers: bool
  extensions_auto_run_commands: bool
  extensions_debug: bool

map:
  - type: addon_config
    read_only: false
    path: /a0/usr

hassio_api: true
homeassistant_api: true

privileged:
  - SYS_ADMIN
  
# Environment variables for Agent Zero
# Note: WEB_UI_HOST and WEB_UI_PORT are not set - use Agent Zero defaults
# Agent Zero binds to 0.0.0.0:80 by default
environment:
  A0_SET_searxng_server_enabled: "true"
  A0_SET_cloudflare_tunnel_enabled: "false"
  HOME: "/a0/usr"
  XDG_CONFIG_HOME: "/a0/usr/.config"
  XDG_DATA_HOME: "/a0/usr/.local/share"
  XDG_STATE_HOME: "/a0/usr/.local/state"
  GH_CONFIG_DIR: "/a0/usr/.config/gh"
  PIP_CACHE_DIR: "/a0/usr/.pip-cache"
