app:
  name: Agent Zero
  description: AI Assistant addon for Home Assistant

configuration:
  agent_zero_branch:
    name: Agent Zero branch
    description: "Which Agent Zero branch to run. 'main' uses the stable release baked into the image (default). 'development' clones the latest development branch from GitHub at every startup — slower boot, bleeding-edge features."
  extension_repositories:
    name: Extension repositories
    description: Array of Git repository URLs containing Agent Zero extensions.
  extensions_auto_install:
    name: Auto-install extension files
    description: Automatically copy extension files from configured repositories at startup.
  extensions_auto_run_installers:
    name: Auto-run installer scripts
    description: If an extension repository contains an installer script, execute it automatically at startup.
  extensions_auto_run_commands:
    name: Auto-run manifest commands
    description: Execute startup commands declared by extension manifests (advanced, use only with trusted repositories).
  extensions_debug:
    name: Extensions debug logs
    description: Enable verbose logs for extension repository loading and auto-run command execution.